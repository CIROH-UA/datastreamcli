name: Test TEEHR Integration

on:
  workflow_dispatch:  
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/datastream'
      - 'versions.yml'
      - 'docker/Dockerfile.datastream-deps'

  push:
    branches:
      - main
    paths:
      - 'scripts/datastream'
      - 'versions.yml'
      - 'docker/Dockerfile.datastream-deps'      

permissions:
  id-token: write
  contents: read

jobs:
  test-datastream-options:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: us-east-1

    - name: Build or pull datastream-deps
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
        elif [ "${{ github.event_name }}" == "push" ]; then
          BASE=${{ github.event.before }}
          HEAD=${{ github.sha }}
        else
          BASE=origin/main
          HEAD=HEAD
        fi
        DIFF=$(git diff --name-only $BASE...$HEAD)
        BUILD_DEPS=false
        if echo "$DIFF" | grep -q "docker/Dockerfile.datastream-deps"; then
          BUILD_DEPS=true
        fi
        if echo "$DIFF" | grep -q "versions.yml"; then
          if git diff -U0 $BASE...$HEAD -- versions.yml | grep -q "datastream-deps"; then
            BUILD_DEPS=true
          fi
        fi
        if [ "$BUILD_DEPS" = true ]; then
          echo "Deps changed, building..."
          docker compose -f docker/docker-compose.yml build datastream-deps
        else
          echo "Deps unchanged, pulling from Docker Hub..."
          docker pull awiciroh/datastream-deps:latest
        fi

    - name: Build datastream
      run: docker compose -f docker/docker-compose.yml build datastream
        
    - name: Get geopackage 
      run: |
        curl -L -O https://communityhydrofabric.s3.us-east-1.amazonaws.com/hydrofabrics/community/VPU/vpu-09_subset.gpkg      
      
    - name: TEEHR integration test
      if: always()
      run: |   
        export DS_TAG=latest     
        ./scripts/datastream -s 202008080100 -e 202008080200 -C NWM_V3_RETRO -d ./data/outputs -E True -r s3://ciroh-community-ngen-datastream/resources/v2.2_hydrofabric/datastream-resources/VPU_09 -R https://ciroh-community-ngen-datastream.s3.us-east-1.amazonaws.com/realizations/realization_VPU_09.json

        
           
