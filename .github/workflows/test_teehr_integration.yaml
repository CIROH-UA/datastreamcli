name: Test TEEHR Integration

on:
  workflow_dispatch:  
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/datastream'    
      - '.github/workflows/test_teehr_integration.yaml'
      
  push:
    branches:
      - main
    paths:
      - 'scripts/datastream'      
      - '.github/workflows/test_teehr_integration.yaml'

permissions:
  contents: read  

jobs:
  test-datastream-options:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configure AWS
      run: |
        aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws configure set region us-east-1    
        export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
        export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
        echo $AWS_ACCESS_KEY_ID
        echo $AWS_SECRET_ACCESS_KEY

    - name: Build or pull datastream-deps
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          DIFF=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})
        elif [ "${{ github.event_name }}" == "push" ]; then
          DIFF=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
        else
          DIFF=$(git diff --name-only origin/main...HEAD)
        fi
        if echo "$DIFF" | grep -q "docker/Dockerfile.datastream-deps"; then
          echo "Deps Dockerfile changed, building..."
          docker compose -f docker/docker-compose.yml build datastream-deps
        else
          echo "Deps Dockerfile unchanged, pulling from Docker Hub..."
          docker pull awiciroh/datastream-deps:latest
        fi

    - name: Build datastream
      run: docker compose -f docker/docker-compose.yml build datastream
        
    - name: Get geopackage 
      run: |
        curl -L -O https://communityhydrofabric.s3.us-east-1.amazonaws.com/hydrofabrics/community/VPU/vpu-09_subset.gpkg      
      
    - name: TEEHR integration test
      if: always()
      run: |   
        export DS_TAG=latest     
        ./scripts/datastream -s 202008080100 -e 202008080200 -C NWM_V3_RETRO -d ./data/outputs -E True -r s3://ciroh-community-ngen-datastream/resources/v2.2_hydrofabric/datastream-resources/VPU_09 -R https://ciroh-community-ngen-datastream.s3.us-east-1.amazonaws.com/realizations/realization_VPU_09.json

        
           
