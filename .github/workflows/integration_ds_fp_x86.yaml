name: Datastream x datastream Integration on X86
on:
  workflow_dispatch:
    inputs:
      ds_tag:
        description: 'DS Docker version tag which you want to test with'
        required: false
        default: ''
        type: string
      fp_tag:
        description: 'FP Docker version tag which you want to test with'
        required: false
        default: ''
        type: string
  push:
    branches:
      - main
    paths:
      - 'docker/**' 
      - 'src/datastreamcli/**'
      - 'tests/**'
      - '!src/datastreamcli/README.md'
  pull_request:
    paths:
      - 'docker/**' 
      - 'src/datastreamcli/**'
      - 'tests/**'
      - '!src/datastreamcli/README.md'
  
permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  build-test-docker-x86:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{secrets.DOCKERHUB_USERNAME}}
        password: ${{secrets.DOCKERHUB_TOKEN}}        

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: us-east-1

    - name: Build docker containers
      run : |
        if [ -z "${{ inputs.fp_tag }}" ]; then
          echo "FP_TAG input not provided, building datastream containers..."
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            DIFF=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})
          elif [ "${{ github.event_name }}" == "push" ]; then
            DIFF=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
          else
            DIFF=$(git diff --name-only origin/main...HEAD)
          fi
          if echo "$DIFF" | grep -q "docker/Dockerfile.datastream-deps"; then
            echo "Deps Dockerfile changed, building deps..."
            TAG=latest-x86 docker compose -f docker/docker-compose.yml build datastream-deps
          else
            echo "Deps Dockerfile unchanged, pulling from Docker Hub..."
            docker pull awiciroh/datastream-deps:latest-x86
          fi
          TAG=latest-x86 docker compose -f docker/docker-compose.yml build datastream
        else
          echo "FP_TAG input provided (${{ inputs.fp_tag }}), skipping datastream build and using existing images..."
        fi

    - name: Test docker containers
      env:
        DS_TAG: ${{ inputs.ds_tag || 'latest-x86' }}
        FP_TAG: ${{ inputs.fp_tag || 'latest-x86' }}
      run : |
        docker images
        curl -L -O https://ngen-datastream.s3.us-east-2.amazonaws.com/palisade.gpkg
        ./scripts/datastream -s 202006200100 -e 202006200200 -C NWM_RETRO_V3 -d $(pwd)/data/datastream_test -g $(pwd)/palisade.gpkg -R $(pwd)/configs/ngen/realization_sloth_nom_cfe_pet.json
