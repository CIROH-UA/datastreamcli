name: Test Datastream NGIAB Integration

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflow/test_datastream_options.yaml
      - 'docker/**'
      - '!docker/README.md'
      - 'scripts/datastream'
      - 'src/datastreamcli/**'
      - '!src/datastreamcli/README.md'
      - 'versions.yml'

  pull_request:
    branches:
      - main
    paths:
      - .github/workflow/test_datastream_options.yaml
      - 'docker/**'
      - '!docker/README.md'
      - 'scripts/datastream'
      - 'src/datastreamcli/**'
      - '!src/datastreamcli/README.md'
      - 'versions.yml'            

permissions:
  id-token: write
  contents: read

jobs:
  test-ngiab-integration:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::879381264451:role/github-actions-terraform-oidc
        aws-region: us-east-1

    - name: Build or pull datastream-deps
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
        elif [ "${{ github.event_name }}" == "push" ]; then
          BASE=${{ github.event.before }}
          HEAD=${{ github.sha }}
        else
          BASE=origin/main
          HEAD=HEAD
        fi
        DIFF=$(git diff --name-only $BASE...$HEAD)
        BUILD_DEPS=false
        if echo "$DIFF" | grep -q "docker/Dockerfile.datastream-deps"; then
          BUILD_DEPS=true
        fi
        if echo "$DIFF" | grep -q "versions.yml"; then
          if git diff -U0 $BASE...$HEAD -- versions.yml | grep -q "datastream-deps"; then
            BUILD_DEPS=true
          fi
        fi
        if [ "$BUILD_DEPS" = true ]; then
          echo "Deps changed, building..."
          docker compose -f docker/docker-compose.yml build datastream-deps
        else
          echo "Deps unchanged, pulling from Docker Hub..."
          docker pull awiciroh/datastream-deps:latest
        fi

    - name: Build datastream
      run: docker compose -f docker/docker-compose.yml build datastream
 
    - name: Base test and NWM_RETRO_V3
      run: |        
        sudo rm -rf $(pwd)/data/datastream_test        
        export DS_TAG=latest
        ./scripts/datastream -s 202006200100 -e 202006200200 -C NWM_RETRO_V3 -d $(pwd)/data/datastream_test -g https://ciroh-community-ngen-datastream.s3.amazonaws.com/resources/v2.2_hydrofabric/datastream-resources/VPU_09/config/nextgen_VPU_09.gpkg -R $(pwd)/configs/ngen/realization_sloth_nom_cfe_pet.json