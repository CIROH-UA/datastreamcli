name: Build and Test DataStream CLI on X86
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths:
      - 'docker/**'
      - 'src/datastreamcli/**'
      - 'tests/**'
      - '!src/datastreamcli/README.md'
      - '.github/workflows/build_test_ds_x86.yaml'
  pull_request:
    paths:
      - 'docker/**'
      - 'src/datastreamcli/**'
      - 'tests/**'
      - '!src/datastreamcli/README.md'
      - '.github/workflows/build_test_ds_x86.yaml'

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      deps-changed: ${{ steps.changes.outputs.deps }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for deps Dockerfile changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            DIFF=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})
          elif [ "${{ github.event_name }}" == "push" ]; then
            DIFF=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
          else
            DIFF=$(git diff --name-only origin/main...HEAD)
          fi

          if echo "$DIFF" | grep -q "docker/Dockerfile.datastream-deps"; then
            echo "deps=true" >> $GITHUB_OUTPUT
          else
            echo "deps=false" >> $GITHUB_OUTPUT
          fi

  build-x86:
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - name: Pre-cleanup workspace
        continue-on-error: true
        run: |
          sudo rm -rf ${{ github.workspace }}/* || true
          sudo rm -rf ${{ github.workspace }}/.* || true

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build datastream-deps (only if Dockerfile changed)
        if: needs.detect-changes.outputs.deps-changed == 'true'
        run: |
          cd docker
          TAG=latest-x86 docker compose -f docker-compose.yml build datastream-deps

      - name: Pull datastream-deps from Docker Hub (if not built)
        if: needs.detect-changes.outputs.deps-changed != 'true'
        run: |
          docker pull awiciroh/datastream-deps:latest-x86

      - name: Build datastream
        run: |
          cd docker
          TAG=latest-x86 docker compose -f docker-compose.yml build datastream
            
      - name: List built images
        run: docker images | grep datastream

      - name: Save Docker images
        run: |
          docker save awiciroh/datastream:latest-x86 | gzip > /tmp/datastream-x86.tar.gz
          
      - name: Upload datastream image
        uses: actions/upload-artifact@v4
        with:
          name: datastream-x86
          path: /tmp/datastream-x86.tar.gz
          retention-days: 1

      - name: Clean up local tar files
        if: always()
        run: rm -f /tmp/datastream-x86.tar.gz

  test-x86:
    needs: build-x86
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        test-suite:
          # Validation Tests - All independent
          - name: "Validation - Missing Geopackage"
            image: "datastream"
            command: "pytest -vv tests/test_validation.py::test_missing_geopackage"
          
          - name: "Validation - Duplicate Geopackage"
            image: "datastream"
            command: "pytest -vv tests/test_validation.py::test_duplicate_geopackage"
          
          - name: "Validation - Missing Realization"
            image: "datastream"
            command: "pytest -vv tests/test_validation.py::test_missing_realization"
          
          - name: "Validation - Duplicate Realization"
            image: "datastream"
            command: "pytest -vv tests/test_validation.py::test_duplicate_realization"
          
          - name: "Validation - Missing BMI Config"
            image: "datastream"
            command: "pytest -vv tests/test_validation.py::test_missing_bmi_config"
          
          - name: "Validation - Missing Forcings"
            image: "datastream"
            command: "pytest -vv tests/test_validation.py::test_missing_forcings"
          
          - name: "Validation - Forcings Time Axis"
            image: "datastream"
            command: "pytest -vv tests/test_validation.py::test_forcings_time_axis"
          
          - name: "Validation - Missing T-Route Config"
            image: "datastream"
            command: "pytest -vv tests/test_validation.py::test_missing_troute_config"
          
          # BMI Config Generation Tests - Run entire file since tests depend on each other
          - name: "BMI Config Generation - All Tests"
            image: "datastream"
            command: "pytest -vv tests/test_bmi_config_generation.py"
          
          # Configuration Tests - Run entire file since tests may share setup
          - name: "Configuration - All Tests"
            image: "datastream"
            command: "pytest -vv tests/test_configuration.py"

    name: "${{ matrix.test-suite.name }}"
    
    steps:
      - name: Pre-cleanup workspace
        continue-on-error: true
        run: |
          sudo rm -rf ${{ github.workspace }}/* || true
          sudo rm -rf ${{ github.workspace }}/.* || true
          
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: datastream-x86  
          path: /tmp/artifacts

      - name: Verify artifact and load
        run: |
          set -euo pipefail
          ls -lh /tmp/artifacts
          
          for i in 1 2 3; do
            if gunzip -c /tmp/artifacts/datastream-x86.tar.gz | docker load; then
              echo "Successfully loaded image on attempt $i"
              docker images | grep datastream
              break
            else
              echo "Failed to load image on attempt $i"
              if [ $i -lt 3 ]; then
                echo "Retrying in 10 seconds..."
                sleep 10
              else
                exit 1
              fi
            fi
          done
          
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run ${{ matrix.test-suite.name }}
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/datastreamcli \
            -w /datastreamcli \
            -e AWS_REGION=us-east-1 \
            -e "AWS_ACCESS_KEY_ID=${{ env.AWS_ACCESS_KEY_ID }}" \
            -e "AWS_SECRET_ACCESS_KEY=${{ env.AWS_SECRET_ACCESS_KEY }}" \
            -e "AWS_SESSION_TOKEN=${{ env.AWS_SESSION_TOKEN }}" \
            awiciroh/${{ matrix.test-suite.image }}:latest-x86 \
            ${{ matrix.test-suite.command }}
          
  cleanup-artifacts:
    needs: test-x86
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Delete artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: datastream-x86